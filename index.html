<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Galaxy Chat</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="splash" class="splash-screen">
    <div class="logo">
      <svg width="100" height="100" viewBox="0 0 100 100">
        <circle cx="50" cy="50" r="45" fill="#4a90e2"/>
        <circle cx="35" cy="35" r="5" fill="white"/>
        <circle cx="50" cy="25" r="3" fill="white"/>
        <circle cx="65" cy="35" r="4" fill="white"/>
        <circle cx="70" cy="55" r="2" fill="white"/>
        <circle cx="50" cy="70" r="6" fill="white"/>
        <text x="50" y="90" text-anchor="middle" fill="white" font-size="12">Galaxy</text>
      </svg>
    </div>
    <h1>Welcome to Galaxy</h1>
    <p>Loading...</p>
    <button id="skipButton">Skip</button>
  </div>

  <div id="app" class="hidden">
    <header>
      <div class="logo">
        <svg width="50" height="50" viewBox="0 0 100 100">
          <circle cx="50" cy="50" r="45" fill="#4a90e2"/>
          <circle cx="35" cy="35" r="5" fill="white"/>
          <circle cx="50" cy="25" r="3" fill="white"/>
          <circle cx="65" cy="35" r="4" fill="white"/>
          <circle cx="70" cy="55" r="2" fill="white"/>
          <circle cx="50" cy="70" r="6" fill="white"/>
        </svg>
        <span>Galaxy</span>
      </div>
    </header>

    <div class="chat-container">
      <div id="messages" class="messages"></div>
      <div class="input-container">
        <input type="text" id="messageInput" placeholder="Type a message...">
        <input type="file" id="photoInput" accept="image/*" style="display: none;">
        <button id="voiceButton">🎤</button>
        <button id="photoButton">📷</button>
        <button id="sendButton">Send</button>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
